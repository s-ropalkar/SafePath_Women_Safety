<!DOCTYPE html>
<html lang="en">
<head>
  <title>SafePath AI - Reset Password</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="reset-page">
  <main class="login-shell">
    <section class="login-card">
      <header class="login-brand">
        <div class="brand-mark"><i class="fa-solid fa-shield-halved"></i></div>
        <div>
          <h1>Reset Password</h1>
          <p>Choose a new password for your account</p>
        </div>
      </header>
      <div class="input-group">
        <label>New Password</label>
        <input id="newPassword" type="password" placeholder="Min 6 characters" autocomplete="new-password"/>
      </div>
      <button type="button" id="resetBtn" class="btn-primary"><i class="fa-solid fa-key" style="margin-right:8px"></i>Update Password</button>
      <p class="info-text login-switch" style="margin-top:14px"><a href="login.html">Back to login</a></p>
    </section>
  </main>
  <div id="toastHost"></div>
  <script src="origin.js"></script>
  <script>
    const API = getApiBase();
    const token = new URLSearchParams(location.search).get("token");

    function toast(message, type = "info") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = message;
      document.getElementById("toastHost").appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }

    document.getElementById("resetBtn").onclick = async () => {
      const password = document.getElementById("newPassword").value;
      if (!token) {
        toast("Invalid reset link.", "danger");
        return;
      }
      if (!password || password.length < 6) {
        toast("Password must be at least 6 characters.", "warn");
        return;
      }
      try {
        const res = await fetch(`${API}/api/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Reset failed");
        toast("Password updated. Redirecting to login…", "success");
        setTimeout(() => { location.href = "login.html"; }, 1500);
      } catch (err) {
        toast(err.message, "danger");
      }
    };
  </script>
</body>
</html>
