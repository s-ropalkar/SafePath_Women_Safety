# Render Blueprint — Docker deployment (Root Directory: safepath in dashboard)
services:
  - type: web
    name: safepath-ai
    runtime: docker
    region: singapore
    plan: free
    rootDir: safepath
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: SAFEPATH_ROOT
        value: /app
      - key: SAFEPATH_MYSQL_HOST
        sync: false
      - key: SAFEPATH_MYSQL_PORT
        value: "4000"
      - key: SAFEPATH_MYSQL_DATABASE
        value: safepath
      - key: SAFEPATH_MYSQL_USER
        sync: false
      - key: SAFEPATH_MYSQL_PASSWORD
        sync: false
      - key: SAFEPATH_MYSQL_SSL_MODE
        value: REQUIRED
      - key: SAFEPATH_SMTP_HOST
        sync: false
      - key: SAFEPATH_SMTP_USER
        sync: false
      - key: SAFEPATH_SMTP_PASS
        sync: false
      - key: SAFEPATH_APP_BASE_URL
        sync: false
